version: 0.2

phases:
  install:
    commands:
      - echo "Installing AWS CLI"
      - aws --version

  build:
    commands:
      - echo "Build phase started"
      - echo "Static files ready"

  post_build:
    commands:
      - echo "Deploying to S3..."
      - aws s3 sync . s3://YOUR-BUCKET-NAME --delete

artifacts:
  files:
    - '**/*'